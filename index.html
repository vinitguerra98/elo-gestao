<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Elo+ Gestão Comercial</title><link rel="stylesheet" href="css/style.css"></head><body><aside class="side"><div class="brand"><img src="img/logo_elo.png" onerror="this.style.display='none'"><div><b>Elo+ Gestão</b><small>ERP Comercial 2.0</small></div></div><button class="nav active" data-tab="dashboard">Dashboard</button><button class="nav" data-tab="pedidos">Pedidos</button><button class="nav" data-tab="financeiro">Financeiro</button><button class="nav" data-tab="producao">Produção</button><button class="nav" data-tab="clientes">Clientes</button><button class="nav" data-tab="agenda">Reativação</button><div class="foot">Dados salvos no navegador<br><button id="resetData">Restaurar base original</button></div></aside><main><header><div><h1 id="title">Dashboard</h1><p id="subtitle">Controle comercial, financeiro e operacional da Elo+</p></div><button class="primary" id="newOrderBtn">+ Novo pedido</button></header><section class="filters"><label>Ano<select id="fYear"><option value="">Todos</option></select></label><label>Mês<select id="fMonth"><option value="">Todos</option></select></label><label>Cliente<select id="fClient"><option value="">Todos</option></select></label><label>Pagamento<select id="fPay"><option value="">Todos</option><option>Pago</option><option>Parcial</option><option>Falta pagar</option></select></label><label>Produção<select id="fProd"><option value="">Todos</option><option>Por fazer</option><option>Pronto</option><option>Há entregar</option><option>Entregue</option></select></label><label>Categoria<select id="fCat"><option value="">Todas</option></select></label><label>Valor min.<input id="fMin" type="number" step="0.01"></label><label>Valor máx.<input id="fMax" type="number" step="0.01"></label><button id="clearFilters">Limpar</button></section><section id="app"></section></main><dialog id="orderModal"><form method="dialog" id="orderForm"><h2 id="modalTitle">Novo pedido</h2><input type="hidden" id="oId"><div class="grid2"><label>Data<input id="oDate" placeholder="dd/mm/aaaa"></label><label>Cliente<select id="oClient"></select></label><label>Produto<input id="oProduct" required></label><label>Categoria<select id="oCat"></select></label><label>Quantidade<input id="oQty" type="number" step="1" value="1"></label><label>Valor total<input id="oTotal" type="number" step="0.01"></label><label>Valor recebido<input id="oReceived" type="number" step="0.01" value="0"></label><label>Pagamento<select id="oPay"><option>Pago</option><option>Parcial</option><option>Falta pagar</option></select></label><label>Produção<select id="oProd"><option>Por fazer</option><option>Pronto</option><option>Há entregar</option><option>Entregue</option></select></label><label>Entrega<select id="oDelivery"><option>Pendente</option><option>Há entregar</option><option>Entregue</option></select></label><label>Origem<input id="oOrigin" value="Manual"></label><label>Observações<input id="oObs"></label></div><menu><button value="cancel">Cancelar</button><button class="primary" id="saveOrder" value="default">Salvar</button></menu></form></dialog><dialog id="clientModal"><form method="dialog" id="clientForm"><h2>Cliente</h2><input type="hidden" id="cId"><label>Nome oficial<input id="cName" required></label><label>Apelidos / variações<input id="cAliases" placeholder="separe por vírgula"></label><label>Telefone<input id="cPhone"></label><label>E-mail<input id="cEmail"></label><label>Observações<input id="cObs"></label><menu><button value="cancel">Cancelar</button><button class="primary" id="saveClient" value="default">Salvar</button></menu></form></dialog><script src="data/data.js"></script><script src="js/app.js"></script></body></html>
